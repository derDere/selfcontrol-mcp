default_prompt: |
  No new user input. Continue working autonomously.
  Re-read your start instructions and notes if your context has been compacted.
  Check your task list and notes for pending work.
  If nothing is pending, review recent changes, check for improvements, or plan ahead.
  Do NOT wait for the user — they will reach out when they need you.
base_dir: ~/.ai-sessions
check_interval_seconds: 10
default_prompt_interval_minutes: 5
generating_timeout_minutes: 30
permission_timeout_minutes: 10
permission_timeout_message: "Permission denied (timeout)."
telegram_bot_token: ""
telegram_user_id: 0
